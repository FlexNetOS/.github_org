# Trivy secret-scanning configuration for FlexNetOS/.github
# Loaded automatically by `trivy fs` / `trivy image` when --secret-config is omitted.
allow-rules:
  - id: research-repomix-archives
    description: >
      Repomix-packed upstream research archives contain example/test credential
      strings (e.g. Stripe test fixtures). They are research artifacts, not real
      secrets, and are also excluded from Gitleaks via .gitleaks.toml.
    path: '^data/brain-data/research/.*/repomix-pack.*\.xml$'
