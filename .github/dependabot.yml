version: 2
updates:
  # Bump versions in our reusable GitHub Actions workflows.
  # Per README: weekly bumps for the GitHub Actions used in this repo.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
