name: release

# Umbrella self-release.
#
# This workflow is currently manual-only (`workflow_dispatch:`) because the
# org-level `RELEASE_TOKEN` secret is not yet wired. Once `RELEASE_TOKEN` is
# configured, re-enable the `push: branches: [main]` trigger below so
# release-please opens/updates the release PR automatically on every merge to
# `main`.
#
# `RELEASE_TOKEN` must be a token with `contents:write`, `pull-requests:write`,
# and `issues:write` scopes. It is passed to `reusable-release.yml` as
# `secrets.release-token`.

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    uses: ./.github/workflows/reusable-release.yml
    with:
      package-name: dot-github
      release-type: release-please
      release-branch: main
    permissions:
      contents: write
      pull-requests: write
      issues: write
    secrets:
      release-token: ${{ secrets.RELEASE_TOKEN }}
