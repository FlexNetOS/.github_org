name: release

# Umbrella self-release.
#
# `RELEASE_TOKEN` is sourced from `meta/envctl` and injected as a repository/org
# secret. It must have `contents:write`, `pull-requests:write`, and
# `issues:write` scopes. It is passed to `reusable-release.yml` as
# `secrets.release-token`.
#
# The `push: branches: [main]` trigger is active once `RELEASE_TOKEN` is
# configured; until then, use `workflow_dispatch:` to test the release path.

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    uses: ./.github/workflows/reusable-release.yml
    with:
      package-name: dot-github
      release-type: release-please
      release-branch: main
    permissions:
      contents: write
      pull-requests: write
      issues: write
    secrets:
      release-token: ${{ secrets.RELEASE_TOKEN }}
