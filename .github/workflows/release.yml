name: release

# Umbrella self-release. This is manual until the FlexNetOS org allows
# GitHub Actions to create pull requests, or this workflow is wired to a
# release-token secret from a GitHub App/PAT. Without that org-level setting,
# release-please can compute the release but fails when opening the release PR.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    uses: ./.github/workflows/reusable-release.yml
    with:
      package-name: dot-github
      release-type: release-please
      release-branch: main
    permissions:
      contents: write
      pull-requests: write
      issues: write
    secrets: inherit
