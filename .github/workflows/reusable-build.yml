name: Reusable Build

# Language-agnostic build dispatcher. Callers select the language flavor
# via the `language` input; this workflow installs the matching
# toolchain and runs the matching build command. Build artifacts are
# uploaded when `artifact-name` is non-empty.
#
# Mixed mode behavior matches reusable-lint.yml.

on:
  workflow_call:
    inputs:
      language:
        description: 'Language flavor: bun, node, python, rust, mixed, or none'
        required: true
        type: string
      working-directory:
        description: 'Working directory for the build command'
        required: false
        type: string
        default: '.'
      artifact-name:
        description: 'Name of the build artifact to upload (empty disables upload)'
        required: false
        type: string
        default: ''
      artifact-path:
        description: 'Path glob of files to include in the build artifact'
        required: false
        type: string
        default: 'dist/**'
      profile:
        description: 'Build profile: debug or release (Rust only; ignored for others)'
        required: false
        type: string
        default: 'release'

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ inputs.language }}, ${{ inputs.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        if: inputs.language == 'bun' || inputs.language == 'mixed'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        if: inputs.language == 'node' || inputs.language == 'mixed'
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: ${{ hashFiles(format('{0}/package-lock.json', inputs.working-directory)) != '' && 'npm' || '' }}

      - name: Set up uv (Python)
        if: inputs.language == 'python' || inputs.language == 'mixed'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Rust
        if: inputs.language == 'rust' || inputs.language == 'mixed'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        if: inputs.language == 'rust' || inputs.language == 'mixed'
        uses: Swatinem/rust-cache@v2

      # --- per-language build ---
      - name: Build (bun)
        if: (inputs.language == 'bun' || inputs.language == 'mixed') && (hashFiles(format('{0}/bun.lock', inputs.working-directory)) != '' || hashFiles(format('{0}/bun.lockb', inputs.working-directory)) != '')
        shell: bash
        run: |
          bun install --frozen-lockfile
          if jq -e '.scripts.build' package.json >/dev/null 2>&1; then
            bun run build
          else
            echo "no 'build' script defined in package.json — skipping bun build"
          fi

      - name: Build (node)
        if: (inputs.language == 'node' || inputs.language == 'mixed') && hashFiles(format('{0}/package-lock.json', inputs.working-directory)) != ''
        shell: bash
        run: |
          npm ci
          if jq -e '.scripts.build' package.json >/dev/null 2>&1; then
            npm run build
          else
            echo "no 'build' script defined in package.json — skipping node build"
          fi

      - name: Build (python)
        if: (inputs.language == 'python' || inputs.language == 'mixed') && hashFiles(format('{0}/pyproject.toml', inputs.working-directory)) != ''
        shell: bash
        run: |
          uv build

      - name: Build (rust)
        if: (inputs.language == 'rust' || inputs.language == 'mixed') && hashFiles(format('{0}/Cargo.toml', inputs.working-directory)) != ''
        shell: bash
        run: |
          if [[ "${{ inputs.profile }}" == "debug" ]]; then
            cargo build --all-features
          else
            cargo build --release --all-features
          fi

      # --- artifact upload ---
      - name: Upload build artifact
        if: inputs.artifact-name != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/${{ inputs.artifact-path }}
          if-no-files-found: error
          retention-days: 30
