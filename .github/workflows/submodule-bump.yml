name: submodule-bump

# DORMANT (ADR-0002, 2026-06-14): repos/MANIFEST.yaml is now an offload stub — there
# are no repo/tool submodules to bump here (they moved to typed hubs). The weekly
# schedule is disabled; the job stays manual-only (workflow_dispatch). The reusable
# mechanism (reusable-submodule-bump.yml) is preserved for hub-side bumping.
# Re-enable the schedule only if .github_org regains bumpable submodules.

on:
  # schedule:                # disabled — dormant per note above (ADR-0002)
  #   - cron: '0 14 * * 1'   # Monday 14:00 UTC
  workflow_dispatch:
    inputs:
      group:
        description: 'MANIFEST group to bump (leave blank for all)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    uses: ./.github/workflows/reusable-submodule-bump.yml
    with:
      group: ${{ inputs.group || '' }}
      pr-title: chore(submodules) weekly bump
    permissions:
      contents: write
      pull-requests: write
