name: Reusable Secrets

# Injects pass-managed secrets into $GITHUB_ENV on a self-hosted runner.
# Caller pattern:
#
#   jobs:
#     build:
#       uses: FlexNetOS/.github/.github/workflows/reusable-secrets.yml@v1
#       with:
#         keys: runner/dockerhub/user,runner/dockerhub/token,runner/cosign/key
#         template: secrets/envs/ci.env.tmpl   # optional alternative to keys=
#       secrets: inherit
#
# Requires: runner has `pass` + `gpg` installed; runner GPG key is in
# `.gpg-id.runner`; the FlexNetOS/.github repo (or this caller's repo)
# is checked out so `secrets/store/` is available.
#
# On a GitHub-hosted runner: use the Bitwarden mirror via the official
# Bitwarden action instead — this workflow's `pass` chain isn't
# available off the dev box.

on:
  workflow_call:
    inputs:
      keys:
        description: 'Comma-separated pass entries to inject (e.g. runner/dockerhub/token)'
        required: false
        type: string
        default: ''
      template:
        description: 'Path to env-template file relative to repo root (alternative to keys=)'
        required: false
        type: string
        default: ''
      umbrella-ref:
        description: 'FlexNetOS/.github ref to check out for secrets/store/ (default: main)'
        required: false
        type: string
        default: 'main'

permissions:
  contents: read

jobs:
  inject:
    runs-on: [self-hosted, linux, x64, local]
    timeout-minutes: 10
    steps:
      - name: Sanity check inputs
        env:
          KEYS: ${{ inputs.keys }}
          TEMPLATE: ${{ inputs.template }}
        run: |
          if [[ -z "$KEYS" && -z "$TEMPLATE" ]]; then
            echo "::error::Must provide either keys= or template="
            exit 1
          fi

      - name: Checkout umbrella for secrets/store/
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Umbrella repo; name-agnostic. Set org var UMBRELLA_REPO at the future restore to '.github'. Interim fallback = current name.
          repository: ${{ vars.UMBRELLA_REPO || 'FlexNetOS/.github_org' }}
          ref: ${{ inputs.umbrella-ref }}
          path: .umbrella
          # No secrets needed for a public repo

      - name: Pull latest pass store
        working-directory: .umbrella
        run: |
          export PASSWORD_STORE_DIR="$PWD/secrets/store"
          # The store IS the git repo we just cloned — no extra pull needed.
          ls -la "$PASSWORD_STORE_DIR" || true

      - name: Inject via keys=
        if: inputs.keys != ''
        env:
          PASSWORD_STORE_DIR: ${{ github.workspace }}/.umbrella/secrets/store
          KEYS: ${{ inputs.keys }}
        run: |
          IFS=',' read -ra entries <<< "$KEYS"
          for entry in "${entries[@]}"; do
            entry=$(echo "$entry" | xargs)   # trim
            [[ -z "$entry" ]] && continue
            # var name = leaf, uppercased, hyphens to underscores
            name=$(basename "$entry" | tr 'a-z-' 'A-Z_')
            val=$(pass show "$entry") || { echo "::error::pass entry '$entry' not found"; exit 1; }
            # Mask in logs
            echo "::add-mask::$val"
            {
              echo "${name}<<EOF"
              echo "$val"
              echo "EOF"
            } >> "$GITHUB_ENV"
            echo "INJECTED $name (from $entry)"
          done

      - name: Inject via template=
        if: inputs.template != ''
        env:
          PASSWORD_STORE_DIR: ${{ github.workspace }}/.umbrella/secrets/store
          TEMPLATE: ${{ inputs.template }}
        run: |
          tmpl=".umbrella/$TEMPLATE"
          [[ -f "$tmpl" ]] || { echo "::error::template not found: $tmpl"; exit 1; }
          bash .umbrella/scripts/secrets-inject.sh "$tmpl" | while IFS= read -r line; do
            # `secrets-inject.sh` emits `export KEY='value'`; convert for GITHUB_ENV
            if [[ "$line" =~ ^export\ ([A-Za-z_][A-Za-z0-9_]*)=\'(.*)\'$ ]]; then
              name="${BASH_REMATCH[1]}"
              val="${BASH_REMATCH[2]}"
              # un-escape '\'' → '
              val="${val//\'\\\'\'/\'}"
              echo "::add-mask::$val"
              {
                echo "${name}<<EOF"
                echo "$val"
                echo "EOF"
              } >> "$GITHUB_ENV"
              echo "INJECTED $name"
            fi
          done
