name: manifest-drift

# Report-only umbrella-hygiene checks (additive reconciliation tooling).
# Every job is `continue-on-error: true` for its first green cycle, then is
# promoted to STRICT on `main` per the "CI invariant promotion pattern" in
# CONTRIBUTING.md (canonical reference: the upgrade-auto-review workflow).
# See data/brain-data/research/my-github-reconciliation.md.

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  claude-dir-check:
    name: No PascalCase Claude/ directories
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          submodules: false
      - name: Assert only lowercase .claude/ exists
        run: |
          MATCHES=$(find . -maxdepth 6 -type d -name 'Claude' \
            -not -path '*/node_modules/*' -not -path '*/.git/*' || true)
          if [ -n "$MATCHES" ]; then
            echo "ERROR: PascalCase Claude/ directories found:"
            echo "$MATCHES"
            echo "Use lowercase .claude/ instead. See CONTRIBUTING.md -> Directory conventions for AI tooling."
            exit 1
          fi
          echo "claude-dir check: OK"

  claude-settings-doctor:
    name: .claude/settings.json hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          submodules: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Scan for hardcoded user-home paths / aspirational keys
        run: |
          if [ -f scripts/claude-settings-doctor.js ]; then
            node scripts/claude-settings-doctor.js --check --allowlist .claude/.doctor-allowlist
          else
            echo "scripts/claude-settings-doctor.js not present yet — skipping"
          fi

  check-user-todo-step5:
    name: USER.TODO#5 fork-dependency tags (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true   # REPORT_ONLY / informational
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          submodules: false
      - name: List untagged FlexNetOS-fork MANIFEST entries
        run: |
          if [ -f scripts/check-user-todo-step5.sh ]; then
            bash scripts/check-user-todo-step5.sh --list-untagged || true
          else
            echo "scripts/check-user-todo-step5.sh not present yet — skipping"
          fi

  open-questions-lint:
    name: open-questions.md schema
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # STRICT: promoted 2026-05-28 after one green cycle on feat/reconciliation-slice-tooling (run 26598828751)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          submodules: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Validate open-questions schema
        run: |
          if [ -f scripts/open-questions-lint.js ] && [ -f .omc/plans/open-questions.md ]; then
            node scripts/open-questions-lint.js .omc/plans/open-questions.md
          else
            echo "open-questions linter or log not present yet — skipping"
          fi

  github-doctor-renovate:
    name: GitHub doctor — Renovate/Dependabot check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          submodules: false
      - name: Triple-verify Renovate config and no Dependabot residue
        run: bash scripts/tests/test-github-doctor.sh

  trivy-secret-suppressions:
    name: Trivy secret suppressions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # STRICT: promoted 2026-06-21 after a green PR cycle (run 27905729236). The test is
    # deterministic — secret-scanner only, SHA-pinned trivy v0.70.0, no vuln-DB download.
    # (manifest-drift only runs on PR/dispatch, never on a main push — same green-cycle bar
    # under which open-questions-lint was promoted. See CHANGELOG.) Not in the required-checks
    # ruleset, so a failure is a visible red, not a merge block.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          submodules: false
      - name: Triple-verify research repomix archives do not fail Trivy
        run: bash scripts/tests/test-trivy-secret-suppressions.sh

  github-policy-drift:
    name: GitHub policy drift (dry-run)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    # INTENTIONALLY fail-open advisory: no continue-on-error, and NOT in the required-checks
    # ruleset. Do not "fix" by adding continue-on-error or promoting to required.
    # The drift check is scope-aware (scripts/apply-github-policies.py): state it
    # cannot READ with the active token is classified UNVERIFIED and does NOT fail
    # the check — only genuine, verified drift fails.
    #   FULL verification: POLICY_DRIFT_TOKEN is a flexnetos-github-app installation
    #   token minted + injected by the envctl relay (scripts/rotate-policy-drift-token.sh,
    #   run by a systemd --user timer on the vault host — see
    #   scripts/install-policy-drift-rotation.sh). GitHub caps the installation token at
    #   ~60 min, so the timer re-mints every ~45 min to keep a VALID token present
    #   continuously (the relay's "24h" is the credential-rotation policy). It carries
    #   `administration: write` (the level GitHub requires for an App token to READ
    #   ruleset bypass_actors + repo admin merge-flags — `administration: read`
    #   redacts them), so this job verifies the full admin surface; the short token life
    #   bounds its blast radius (virtual-credit-card model).
    #   FALLBACK: if the rotation has not run (vault locked / host offline) the script's
    #   expiry pre-check drops a stale token so the secret is absent and the job uses the
    #   default GITHUB_TOKEN — those admin reads come back UNVERIFIED (green), never a
    #   false failure. Advisory (not in the required-checks ruleset); a real, verified
    #   drift surfaces as a visible red.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          submodules: false
      - name: Check committed policy matches live GitHub state
        env:
          GH_TOKEN: ${{ secrets.POLICY_DRIFT_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 scripts/apply-github-policies.py --check

  hermetic-audit:
    name: Hermetic dependency / clone audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          submodules: false
      - name: Check for non-hermetic patterns
        # STEP-level continue-on-error (NOT job-level): the audit reports pre-existing
        # non-hermetic findings advisory-only. Step-level renders the check GREEN while
        # still logging findings; job-level would render it RED (non-blocking but noisy).
        continue-on-error: true
        run: python3 scripts/hermetic-audit.py --fail .

  config-health-doctor:
    name: Runtime config-health (hooks/binaries)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # REPORT_ONLY first green cycle; promote to STRICT (and wire into `make verify`)
    # per the CI-invariant-promotion pattern. Gated on HUT-1 (#210): develop's
    # settings.json still carries the quoted-tilde ERROR until that merges, so the
    # doctor exits non-zero today. continue-on-error is at STEP level (NOT job level)
    # so the advisory check renders GREEN while still printing findings to the log —
    # job-level continue-on-error would render the check RED (non-blocking but noisy).
    # This matches the established report-only idiom used by hermetic-audit. Promote
    # by removing the step-level continue-on-error once #210 lands the quoted-tilde fix.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          submodules: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Scan settings.json hook wiring for dead refs / quoted-tilde bugs
        # STEP-level continue-on-error → advisory GREEN during report-only (see job comment).
        continue-on-error: true
        run: |
          if [ -f scripts/config-health-doctor.js ]; then
            node scripts/config-health-doctor.js --config .claude/settings.json
          else
            echo "scripts/config-health-doctor.js not present yet — skipping"
          fi

