name: Reusable Security Scan

# Combined security gate: CodeQL (SAST) + Trivy (filesystem + IaC) +
# Gitleaks (secret scan). Each scanner runs in its own job so a failure
# in one doesn't mask the others.
#
# - CodeQL: SARIF results uploaded to the repo's Security tab.
# - Trivy: filesystem + IaC misconfig scan, SARIF uploaded.
# - Gitleaks: secret scan over the full history.
#
# Calling repos should pin to @v1 once cut. See RELEASING.md.

on:
  workflow_call:
    inputs:
      languages:
        description: 'CodeQL languages to scan (comma-separated): javascript, python, go, java, ruby, cpp, csharp, swift, kotlin, actions'
        required: false
        type: string
        default: 'javascript,python'
      fail-on-severity:
        description: 'Minimum severity that fails Trivy: CRITICAL, HIGH, MEDIUM, LOW, UNKNOWN'
        required: false
        type: string
        default: 'HIGH'
      gitleaks-config:
        description: 'Path to a gitleaks config (empty = default ruleset)'
        required: false
        type: string
        default: ''
      working-directory:
        description: 'Working directory (Trivy scan root)'
        required: false
        type: string
        default: '.'

permissions:
  contents: read
  security-events: write   # required for CodeQL + Trivy SARIF upload
  actions: read

jobs:
  matrix-prep:
    name: Expand language matrix
    runs-on: ubuntu-latest
    outputs:
      languages: ${{ steps.set.outputs.languages }}
    steps:
      - name: Build JSON array from comma-separated input
        id: set
        shell: bash
        env:
          LANGS: ${{ inputs.languages }}
        run: |
          # Trim spaces and convert "a,b,c" -> ["a","b","c"]
          json=$(printf '%s' "$LANGS" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$"; ""))')
          echo "languages=$json" >> "$GITHUB_OUTPUT"

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: matrix-prep
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.matrix-prep.outputs.languages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  trivy:
    name: Trivy filesystem + IaC
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: ${{ inputs.working-directory }}
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: ${{ inputs.fail-on-severity }},CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Run Trivy IaC scan
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scan-ref: ${{ inputs.working-directory }}
          format: 'sarif'
          output: 'trivy-config.sarif'
          severity: ${{ inputs.fail-on-severity }},CRITICAL
          exit-code: '0'   # IaC findings reported, never block

      - name: Upload Trivy filesystem SARIF
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-fs'

      - name: Upload Trivy IaC SARIF
        if: always() && hashFiles('trivy-config.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-config.sarif'
          category: 'trivy-config'

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # gitleaks needs full history

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_CONFIG: ${{ inputs.gitleaks-config }}
