name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - ".github/**"
      - "scripts/**"
      - "runner/**"
      - "github-app/**"
      - "tools/**"
      - "*.md"

permissions:
  contents: read
  pull-requests: read
  issues: read
  id-token: write  # Required by anthropics/claude-code-action to exchange an OIDC token for a short-lived OAuth token (audience: github.com/anthropics/claude-code-action).

# OIDC trust policy: this workflow receives a GitHub-issued OIDC token scoped to
# this repository/workflow. The Claude Code action forwards it to Anthropic's
# token exchange, which verifies the `sub` claim (`repo:FlexNetOS/.github:pull_request`)
# before issuing a temporary `CLAUDE_CODE_OAUTH_TOKEN`. No long-lived credential is
# stored in this repo; the secret below is injected by `meta/envctl` and rotated there.

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: "!github.event.pull_request.draft"

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

