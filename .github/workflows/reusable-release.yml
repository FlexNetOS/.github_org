name: Reusable Release

# Release dispatcher backed by release-please (or semantic-release). On
# merge to the release branch, computes the next semver bump from
# Conventional Commit history, opens or updates a release PR, and on
# merge of that PR cuts a tag + GitHub Release.
#
# This body is a SCAFFOLD pending follow-on implementation work — it
# ships the `workflow_call` shape, documented inputs, and a
# least-privilege `permissions:` block per the README.

on:
  workflow_call:
    inputs:
      release-type:
        description: 'Release tooling: release-please or semantic-release'
        required: false
        type: string
        default: 'release-please'
      release-branch:
        description: 'Branch that triggers releases'
        required: false
        type: string
        default: 'main'
      package-name:
        description: 'Name of the package being released (used for tag prefix)'
        required: true
        type: string
      changelog-types:
        description: 'JSON array of Conventional Commit types that appear in the changelog'
        required: false
        type: string
        default: '["feat","fix","perf","docs","build","ci","refactor","revert"]'
    secrets:
      release-token:
        description: 'Token with permission to push tags, releases, and the release PR (default: GITHUB_TOKEN)'
        required: false

permissions:
  contents: write          # needed to push tags and create releases
  pull-requests: write     # needed to open/update the release PR
  issues: write            # needed to close issues from release notes

jobs:
  release:
    name: Release (${{ inputs.release-type }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # release tooling needs full history for changelog

      - name: Release (scaffold)
        run: |
          echo "::warning::reusable-release.yml is a scaffold."
          echo "release-type: ${{ inputs.release-type }}"
          echo "release-branch: ${{ inputs.release-branch }}"
          echo "package-name: ${{ inputs.package-name }}"
          echo "changelog-types: ${{ inputs.changelog-types }}"
          echo ""
          echo "Body to be filled in by follow-on work; will route to:"
          echo "  release-please    -> googleapis/release-please-action@v4"
          echo "  semantic-release  -> cycjimmy/semantic-release-action@v4"
