name: Reusable Notify Downstream

# Waits for a named required check on the current ref, then dispatches a
# repository_dispatch event to each downstream repo.
#
# Example caller:
#   jobs:
#     notify:
#       uses: FlexNetOS/.github/.github/workflows/reusable-notify-downstream.yml@main
#       with:
#         downstream-repos: '["FlexNetOS/meta_cli","FlexNetOS/meta_git_cli"]'
#       secrets:
#         parent-repo-pat: ${{ secrets.PARENT_REPO_PAT }}

on:
  workflow_call:
    inputs:
      downstream-repos:
        description: 'JSON array of downstream repos in owner/name form'
        required: true
        type: string
      event-type:
        description: 'repository_dispatch event type'
        required: false
        type: string
        default: 'dependency-updated'
      check-name:
        description: 'Name of the required check to wait for'
        required: false
        type: string
        default: 'Test (ubuntu-latest)'
    secrets:
      parent-repo-pat:
        description: 'PAT with repo scope for downstream repos'
        required: false

permissions:
  contents: read

jobs:
  wait-and-dispatch:
    name: Wait for check and dispatch
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for required check
        uses: lewagon/wait-on-check-action@96d9100b431964d10e0136aff8b9ccb92470505e # v1.8.0
        with:
          ref: ${{ github.sha }}
          check-name: ${{ inputs.check-name }}
          repo-token: ${{ secrets.parent-repo-pat || secrets.GITHUB_TOKEN }}
          wait-interval: 20

      - name: Dispatch to downstream repos
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.parent-repo-pat || secrets.GITHUB_TOKEN }}
          DOWNSTREAM_REPOS: ${{ inputs.downstream-repos }}
          EVENT_TYPE: ${{ inputs.event-type }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          repos="$DOWNSTREAM_REPOS"
          event_type="$EVENT_TYPE"
          if [[ "$repos" == "[]" || -z "$repos" ]]; then
            echo "No downstream repos configured."
            exit 0
          fi
          while IFS= read -r repo; do
            echo "Dispatching $event_type to $repo"
            gh api "repos/$repo/dispatches" \
              --method POST \
              -f "event_type=$event_type" \
              -f "client_payload[repo]=$REPO" \
              -f "client_payload[sha]=$SHA" \
              -f "client_payload[ref]=$REF" \
              -f "client_payload[run_id]=$RUN_ID"
          done < <(printf '%s' "$repos" | jq -r '.[]')
