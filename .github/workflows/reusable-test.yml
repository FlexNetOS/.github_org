name: Reusable Test

# Language-agnostic test dispatcher. Callers select the language flavor
# via the `language` input; this workflow installs the matching
# toolchain and runs the matching test runner. Coverage upload is opt-in
# via the `coverage` input.
#
# Mixed mode behaves the same as reusable-lint.yml: detected toolchains
# run; pinning `language:` explicitly skips detection.

on:
  workflow_call:
    inputs:
      language:
        description: 'Language flavor: bun, node, python, rust, mixed, or none'
        required: true
        type: string
      working-directory:
        description: 'Working directory for the test command'
        required: false
        type: string
        default: '.'
      sibling-repos:
        description: 'JSON array of sibling FlexNetOS repos for meta Rust workspace mode'
        required: false
        type: string
        default: '[]'
      workspace-path:
        description: 'Path for the current repo inside the generated meta Rust workspace'
        required: false
        type: string
        default: ${{ github.event.repository.name }}
      token:
        description: 'GitHub token for cloning private sibling repos (pass a PAT for private repos)'
        required: false
        type: string
        default: ${{ github.token }}
      coverage:
        description: 'Collect coverage and upload as an artifact'
        required: false
        type: boolean
        default: false
      coverage-threshold:
        description: 'Minimum coverage percentage to pass (0 disables)'
        required: false
        type: number
        default: 0
      extra-args:
        description: 'Extra arguments appended to the test command'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ inputs.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Bun
        if: inputs.language == 'bun' || inputs.language == 'mixed'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Set up Node
        if: inputs.language == 'node' || inputs.language == 'mixed'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
          cache: ${{ hashFiles(format('{0}/package-lock.json', inputs.working-directory)) != '' && 'npm' || '' }}

      - name: Set up uv (Python)
        if: inputs.language == 'python' || inputs.language == 'mixed'
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true

      - name: Set up Rust
        if: inputs.language == 'rust' || inputs.language == 'mixed'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        if: inputs.language == 'rust' || inputs.language == 'mixed'
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      # --- per-language test ---
      - name: Test (bun)
        if: (inputs.language == 'bun' || inputs.language == 'mixed') && (hashFiles(format('{0}/bun.lock', inputs.working-directory)) != '' || hashFiles(format('{0}/bun.lockb', inputs.working-directory)) != '')
        shell: bash
        env:
          EXTRA_ARGS: ${{ inputs.extra-args }}
        run: |
          bun install --frozen-lockfile
          if [[ "${{ inputs.coverage }}" == "true" ]]; then
            bun test --coverage $EXTRA_ARGS
          else
            bun test $EXTRA_ARGS
          fi

      - name: Test (node)
        if: (inputs.language == 'node' || inputs.language == 'mixed') && hashFiles(format('{0}/package-lock.json', inputs.working-directory)) != ''
        shell: bash
        env:
          EXTRA_ARGS: ${{ inputs.extra-args }}
        run: |
          npm ci
          npm test -- $EXTRA_ARGS

      - name: Test (python)
        if: (inputs.language == 'python' || inputs.language == 'mixed') && (hashFiles(format('{0}/pyproject.toml', inputs.working-directory)) != '' || hashFiles(format('{0}/setup.py', inputs.working-directory)) != '' || hashFiles(format('{0}/requirements.txt', inputs.working-directory)) != '')
        shell: bash
        env:
          EXTRA_ARGS: ${{ inputs.extra-args }}
        run: |
          if [[ -f pyproject.toml ]]; then
            uv sync --all-extras --dev || uv sync || true
          fi
          if [[ "${{ inputs.coverage }}" == "true" ]]; then
            uv tool install coverage
            uv run -- coverage run -m pytest $EXTRA_ARGS
            uv run -- coverage xml -o coverage.xml
            uv run -- coverage report --fail-under=${{ inputs.coverage-threshold }}
          else
            uv run -- pytest $EXTRA_ARGS
          fi

      - name: Set up meta Rust workspace
        if: (inputs.language == 'rust' || inputs.language == 'mixed') && inputs.sibling-repos != '' && inputs.sibling-repos != '[]'
        uses: ./.github/actions/meta-rust-workspace
        id: meta-ws
        with:
          sibling-repos: ${{ inputs.sibling-repos }}
          workspace-path: ${{ inputs.workspace-path }}
          token: ${{ inputs.token }}

      - name: Resolve workspace directory
        id: final-ws
        shell: bash
        run: |
          if [[ -n "${{ steps.meta-ws.outputs.workspace-dir }}" ]]; then
            echo "dir=${{ steps.meta-ws.outputs.workspace-dir }}" >> "$GITHUB_OUTPUT"
          else
            echo "dir=${{ inputs.working-directory }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Test (rust)
        if: (inputs.language == 'rust' || inputs.language == 'mixed') && hashFiles(format('{0}/Cargo.toml', inputs.working-directory)) != ''
        working-directory: ${{ steps.final-ws.outputs.dir }}
        shell: bash
        env:
          EXTRA_ARGS: ${{ inputs.extra-args }}
        run: |
          if cargo --list 2>/dev/null | grep -q nextest; then
            cargo nextest run --all-features $EXTRA_ARGS
          else
            cargo test --all-features $EXTRA_ARGS
          fi

      # --- coverage artifact (best-effort, only if a coverage file shows up) ---
      - name: Upload coverage artifact
        if: inputs.coverage && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-${{ github.run_id }}-${{ github.job }}
          path: |
            ${{ inputs.working-directory }}/coverage*
            ${{ inputs.working-directory }}/target/coverage*
            ${{ inputs.working-directory }}/.coverage
          if-no-files-found: ignore
          retention-days: 14
