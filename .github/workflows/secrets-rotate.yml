name: secrets-rotate

# Weekly: list secrets older than 90 days and open an issue if any.
# Runs on self-hosted runner because pass + GPG live there.

on:
  schedule:
    - cron: '30 14 * * 1'     # Monday 14:30 UTC, just after submodule-bump
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: [self-hosted, linux, x64, local]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run rotation scan
        id: scan
        continue-on-error: true
        env:
          PASSWORD_STORE_DIR: ${{ github.workspace }}/secrets/store
          ROTATE_DAYS: '90'
        run: |
          chmod +x scripts/secrets-rotate.sh
          scripts/secrets-rotate.sh | tee /tmp/scan-output.txt
          stale=$(grep -c '^STALE:' /tmp/scan-output.txt || true)
          echo "stale=${stale:-0}" >> "$GITHUB_OUTPUT"

      - name: Open / update rotation issue if stale found
        if: steps.scan.outputs.stale != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');
            const body = "Weekly rotation scan found secrets older than 90 days:\n\n```\n" +
                         fs.readFileSync('/tmp/scan-output.txt', 'utf-8') +
                         "\n```\n\nRotate via `pass edit <entry>`, commit, push.";
            // Reuse an open issue with this title if one exists
            const title = 'secrets-rotate: stale entries need rotation';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'secrets,rotation'
            });
            const match = existing.data.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['secrets', 'rotation']
              });
            }
