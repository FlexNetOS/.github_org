name: Reusable Lint

# Language-agnostic lint dispatcher. Callers select the language flavor
# via the `language` input; this workflow installs the matching
# toolchain and runs the matching linter(s). Markdown lint always runs
# (unless language=none).
#
# Mixed mode: every detected toolchain runs. Detection is by lockfile —
# bun.lock(b), package-lock.json, pyproject.toml/requirements*.txt,
# Cargo.toml. If a caller wants only one language even when others are
# present, pin `language:` explicitly instead of using `mixed`.

on:
  workflow_call:
    inputs:
      language:
        description: 'Language flavor: bun, node, python, rust, mixed, or none'
        required: true
        type: string
      paths:
        description: 'Path glob for python lint (default: working-directory)'
        required: false
        type: string
        default: '.'
      working-directory:
        description: 'Working directory for the lint command'
        required: false
        type: string
        default: '.'
      sibling-repos:
        description: 'JSON array of sibling FlexNetOS repos for meta Rust workspace mode'
        required: false
        type: string
        default: '[]'
      workspace-path:
        description: 'Path for the current repo inside the generated meta Rust workspace'
        required: false
        type: string
        default: ${{ github.event.repository.name }}
      token:
        description: 'GitHub token for cloning private sibling repos (pass a PAT for private repos)'
        required: false
        type: string
        default: ${{ github.token }}
      fail-on-warning:
        description: 'Fail the job if the linter emits warnings (Rust: enables `-D warnings`)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  lint:
    name: Lint (${{ inputs.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # --- toolchain setup, conditional per language ---
      - name: Set up Bun
        if: (inputs.language == 'bun' || inputs.language == 'mixed') && (hashFiles(format('{0}/bun.lock', inputs.working-directory)) != '' || hashFiles(format('{0}/bun.lockb', inputs.working-directory)) != '')
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Set up Node
        if: (inputs.language == 'node' || inputs.language == 'mixed') && hashFiles(format('{0}/package-lock.json', inputs.working-directory)) != ''
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
          cache: ${{ hashFiles(format('{0}/package-lock.json', inputs.working-directory)) != '' && 'npm' || '' }}

      - name: Set up uv (Python)
        if: (inputs.language == 'python' || inputs.language == 'mixed') && (hashFiles(format('{0}/pyproject.toml', inputs.working-directory)) != '' || hashFiles(format('{0}/setup.py', inputs.working-directory)) != '' || hashFiles(format('{0}/requirements.txt', inputs.working-directory)) != '')
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          # setup-uv fails when cache is enabled but a repo has no uv.lock.
          # The reusable lint workflow must support mixed repos without Python deps.
          enable-cache: false

      - name: Set up Rust
        if: (inputs.language == 'rust' || inputs.language == 'mixed') && hashFiles(format('{0}/Cargo.toml', inputs.working-directory)) != ''
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        if: (inputs.language == 'rust' || inputs.language == 'mixed') && hashFiles(format('{0}/Cargo.toml', inputs.working-directory)) != ''
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      # --- markdown lint (always, unless language=none) ---
      - name: Markdown lint
        if: inputs.language != 'none'
        shell: bash
        run: |
          if [[ -x scripts/verify-markdown.py ]]; then
            python3 scripts/verify-markdown.py .
          elif command -v bunx >/dev/null 2>&1; then
            bunx --bun markdownlint-cli2 "**/*.md" \
              "!**/node_modules/**" \
              "!**/target/**" \
              "!**/.venv/**" \
              "!**/dist/**" \
              "!**/build/**" \
              "!.omc/**" \
              "!.claude/.omc/**" \
              "!repos/**" \
              "!wiki/raw/**" \
              "!_work/**"
          elif command -v npx >/dev/null 2>&1; then
            npx -y markdownlint-cli2 "**/*.md" \
              "!**/node_modules/**" \
              "!**/target/**" \
              "!**/.venv/**" \
              "!**/dist/**" \
              "!**/build/**" \
              "!.omc/**" \
              "!.claude/.omc/**" \
              "!repos/**" \
              "!wiki/raw/**" \
              "!_work/**"
          else
            echo "No repo-local scripts/verify-markdown.py and neither bunx nor npx is available" >&2
            exit 1
          fi

      # --- workflow lint (always when workflows present) ---
      - name: Workflow lint (actionlint)
        if: inputs.language != 'none' && hashFiles(format('{0}/.github/workflows/*.yml', inputs.working-directory)) != ''
        shell: bash
        run: |
          if [[ -x tools/bin/actionlint ]]; then
            tools/bin/actionlint .github/workflows/*.yml
          elif command -v actionlint >/dev/null 2>&1; then
            actionlint .github/workflows/*.yml
          else
            echo "No repo-local tools/bin/actionlint and no host actionlint available" >&2
            exit 1
          fi

      # --- per-language lint ---
      - name: Lint (bun)
        if: (inputs.language == 'bun' || inputs.language == 'mixed') && (hashFiles(format('{0}/bun.lock', inputs.working-directory)) != '' || hashFiles(format('{0}/bun.lockb', inputs.working-directory)) != '')
        shell: bash
        run: |
          bun install --frozen-lockfile
          if jq -e '.scripts.lint' package.json >/dev/null 2>&1; then
            bun run lint
          else
            echo "no 'lint' script defined in package.json — skipping bun lint step"
          fi

      - name: Lint (node)
        if: (inputs.language == 'node' || inputs.language == 'mixed') && hashFiles(format('{0}/package-lock.json', inputs.working-directory)) != ''
        shell: bash
        run: |
          npm ci
          if jq -e '.scripts.lint' package.json >/dev/null 2>&1; then
            npm run lint
          else
            echo "no 'lint' script defined in package.json — skipping node lint step"
          fi

      - name: Lint (python)
        if: (inputs.language == 'python' || inputs.language == 'mixed') && (hashFiles(format('{0}/pyproject.toml', inputs.working-directory)) != '' || hashFiles(format('{0}/setup.py', inputs.working-directory)) != '' || hashFiles(format('{0}/requirements.txt', inputs.working-directory)) != '')
        shell: bash
        env:
          PATHS: ${{ inputs.paths }}
        run: |
          uv tool install ruff
          uv tool install black
          # shellcheck disable=SC2086
          ruff check $PATHS
          # shellcheck disable=SC2086
          black --check $PATHS

      - name: Set up meta Rust workspace
        if: (inputs.language == 'rust' || inputs.language == 'mixed') && inputs.sibling-repos != '' && inputs.sibling-repos != '[]'
        uses: ./.github/actions/meta-rust-workspace
        id: meta-ws
        with:
          sibling-repos: ${{ inputs.sibling-repos }}
          workspace-path: ${{ inputs.workspace-path }}
          token: ${{ inputs.token }}

      - name: Resolve workspace directory
        id: final-ws
        shell: bash
        env:
          WORKSPACE_DIR: ${{ steps.meta-ws.outputs.workspace-dir }}
          WORKING_DIRECTORY: ${{ inputs.working-directory }}
        run: |
          if [[ -n "$WORKSPACE_DIR" ]]; then
            echo "dir=$WORKSPACE_DIR" >> "$GITHUB_OUTPUT"
          else
            echo "dir=$WORKING_DIRECTORY" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint (rust)
        if: (inputs.language == 'rust' || inputs.language == 'mixed') && hashFiles(format('{0}/Cargo.toml', inputs.working-directory)) != ''
        working-directory: ${{ steps.final-ws.outputs.dir }}
        shell: bash
        env:
          FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}
        run: |
          cargo fmt --all --check
          if [[ "$FAIL_ON_WARNING" == "true" ]]; then
            cargo clippy --all-targets --all-features -- -D warnings
          else
            cargo clippy --all-targets --all-features
          fi
