name: ci

# Umbrella self-CI. Calls the reusable workflows defined in this repo so
# they're exercised on every change (eat your own dog food).

on:
  push:
    # Run on feature/stack branches too so stacked PRs get a base check before
    # their eventual merge target is main.
    branches: ['**']
  pull_request:
    # Stacked PRs often target another feature branch. Validate every PR base,
    # not just PRs whose immediate base is main.
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Block default permissions; callers re-grant minimally.
permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/reusable-lint.yml
    with:
      language: mixed
    secrets: inherit

  manifest-validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Validate repo manifest
        run: python3 scripts/verify-manifest.py repos/MANIFEST.yaml
      - name: Validate tool manifest
        run: python3 scripts/verify-manifest.py tools/MANIFEST.yaml

  actionlint:
    name: actionlint .github/workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run repo-local actionlint wrapper
        run: tools/bin/actionlint .github/workflows/*.yml

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: python3 scripts/verify-markdown.py .

  hermetic-audit:
    name: Hermetic dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: python3 scripts/hermetic-audit.py .

  security:
    needs: lint
    uses: ./.github/workflows/reusable-security.yml
    with:
      languages: 'actions'
      fail-on-severity: high
    secrets: inherit
    permissions:
      actions: read
      contents: read
      security-events: write
