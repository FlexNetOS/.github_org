name: wiki-lint

# Nightly: structural health check on wiki/. Does NOT run the LLM-side lint
# (that requires Claude Code or similar interactively) — only the
# structural checks scriptable from CI.

on:
  pull_request:
    paths:
      - "wiki/**"
  schedule:
    - cron: '0 11 * * *'      # 11:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  structural-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: index.md exists and is non-empty
        run: |
          [[ -s wiki/index.md ]] || { echo "::error::wiki/index.md missing or empty"; exit 1; }
          [[ -s wiki/log.md ]]   || { echo "::error::wiki/log.md missing or empty"; exit 1; }

      - name: log.md entries follow `## [YYYY-MM-DD] op | subject` format
        run: |
          bad=$(grep -E '^## \[' wiki/log.md | grep -v '^## \[[0-9]{4}-[0-9]{2}-[0-9]{2}\] [a-z]+ \|' || true)
          if [[ -n "$bad" ]]; then
            echo "::warning::log.md entries not matching format:"
            echo "$bad"
          fi

      - name: Find broken [[wikilinks]]
        id: broken
        run: |
          set +e
          broken_count=0
          all_pages=$(find wiki/pages -name '*.md' -printf '%f\n' | sed 's/\.md$//' | sort -u)
          while IFS= read -r link; do
            # extract page-name part of [[page-name|optional-display]]
            page=$(echo "$link" | sed -E 's/^\[\[([^|\]]+).*\]\]$/\1/')
            if ! echo "$all_pages" | grep -qx "$page"; then
              broken_count=$((broken_count + 1))
              echo "BROKEN: $link"
            fi
          done < <(grep -roEh '\[\[[^]]+\]\]' wiki/pages/ 2>/dev/null | sort -u)
          echo "broken=$broken_count" >> "$GITHUB_OUTPUT"
          echo "Found $broken_count broken wikilinks"

      - name: Open issue if broken links found
        if: steps.broken.outputs.broken != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `wiki-lint: ${{ steps.broken.outputs.broken }} broken wikilinks`,
              body: `The nightly wiki-lint workflow found broken \`[[wikilinks]]\`.\n\nSee run logs for the list.`,
              labels: ['wiki', 'lint']
            });
