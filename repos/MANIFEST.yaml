# =============================================================================
# FlexNetOS submodule manifest — single source of truth
# =============================================================================
# Schema:
#   - path:          mount point relative to repo root
#     url:           clone URL (origin)
#     upstream:      (optional) upstream URL for forks
#     branch:        branch to track
#     toolchain:     list of language/tool tags
#     groups:        list of group tags for bulk operations
#     partial_clone: (optional) git --filter spec for very large repos
#     notes:         (optional) freeform commentary
#
# Generation: `scripts/submodule-add-all.sh` reads this file and runs
# `git submodule add` for any entry not yet present in `.gitmodules`.
# Prefer not to hand-edit `.gitmodules` directly — use the script to append
# missing entries. Full MANIFEST→.gitmodules regeneration is deferred (see
# G4/G5 in .omc/plans/open-questions.md). Never blindly regenerate.
# =============================================================================

# -----------------------------------------------------------------------------
