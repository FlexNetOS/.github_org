  branch: main
  toolchain: [node, cargo]
  groups: [core, owned, daily]
  notes: |
    Vector DB + GNN layer. 8.8 GB on disk currently — partial clone if
    on-runner constraints become an issue.

- path: repos/owned/ruOS
