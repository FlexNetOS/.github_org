  upstream: https://github.com/ggerganov/llama.cpp
  branch: develop
  toolchain: [cargo, python, make]
  groups: [owned, llm, fork-tracking]
  notes: |
    Forked from ggerganov/llama.cpp. Despite the `owned/` placement, it
