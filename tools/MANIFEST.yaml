# =============================================================================
# FlexNetOS repo-local toolchain manifest
# =============================================================================
# Goal: every tool used by local verification and CI should eventually be either
# a submodule under tools/, a committed repo asset, or a generated binary built
# from an included source submodule.
#
# RELOCATED (ADR-0002, 2026-06-13): the 7 *materialized* source-submodules
# (python/cpython, actionlint, gitleaks, trivy, node, bun, uv) moved OUT of
# .github_org into `tool_hub/repos/` staging — uninitialized pins (upstream
# url + commit SHA preserved, never-downgrade). `.github_org` consumes those
# tools via `tools/assets.json` (download) + `tools/bin/` wrappers, NOT the
# submodules, so their removal does not affect `make verify`. Only the
# not-yet-materialized (`planned`) tools remain listed here.
# =============================================================================

- name: markdownlint-cli2
  path: tools/markdownlint-cli2
  url: https://github.com/DavidAnson/markdownlint-cli2
  branch: main
  kind: source-submodule
  status: planned
  purpose: Full Markdown lint parity when the repo-local Python checker is not enough.
  latest_stable_policy: Track latest stable Node runtime support; fork/update if pinned to a legacy Node.

- name: rust
  path: tools/rust
  url: https://github.com/rust-lang/rust
  branch: master
  kind: source-submodule
  partial_clone: "blob:none"
  status: planned
  purpose: Shared Rust compiler/toolchain for LifeOS, Tauri, ruOS, and other Rust-bearing FlexNetOS repos.
  latest_stable_policy: Track latest stable Rust; do not pin the ecosystem to stale compiler requirements.

- name: vite
  path: tools/frontend/vite
  url: https://github.com/vitejs/vite
  branch: main
  kind: source-submodule
  partial_clone: "blob:none"
  status: planned
  purpose: Shared frontend build tool for LifeOS and other FlexNetOS UI surfaces.
  latest_stable_policy: Track latest stable Vite and current stable Node/Bun runtime support.

- name: vue
  path: tools/frontend/vue
  url: https://github.com/vuejs/core
  branch: main
  kind: source-submodule
  partial_clone: "blob:none"
  status: planned
  purpose: Shared frontend framework source/pin for LifeOS and other Vue-based FlexNetOS UI surfaces.
  latest_stable_policy: Track latest stable Vue 3 release line unless a product repo explicitly records an upgrade blocker.

- name: tauri
  path: tools/frontend/tauri
  url: https://github.com/tauri-apps/tauri
  branch: dev
  kind: source-submodule
  partial_clone: "blob:none"
  status: planned
  purpose: Shared desktop app runtime/tooling source for LifeOS and other Tauri-based FlexNetOS surfaces.
  latest_stable_policy: Track latest stable Tauri 2 release line; keep Rust/Node frontend wrappers current.

- name: bitwarden-cli
  path: tools/bitwarden-clients
  url: https://github.com/bitwarden/clients
  branch: main
  kind: source-submodule
  partial_clone: "blob:none"
  status: planned
  purpose: Source pin for the Bitwarden CLI used to read Bitwarden/Vaultwarden vault items before syncing selected values into GitHub Actions secrets.
  latest_stable_policy: Track latest stable Bitwarden CLI; prefer repo-local wrapper once the binary/source path is materialized.
